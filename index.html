<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Supabase JS library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f3ee; color: #1a1a18; min-height: 100vh; }

    /* Loading */
    #loading-screen { position: fixed; inset: 0; background: #1a1208; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; transition: opacity 0.4s; }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loader-ring { width: 36px; height: 36px; border: 2px solid rgba(201,152,58,0.3); border-top-color: #c9983a; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 13px; color: #7a6e5e; letter-spacing: 0.05em; }

    /* Error */
    #error-screen { display: none; padding: 3rem 1.5rem; text-align: center; }
    #error-screen h2 { font-size: 18px; margin-bottom: 8px; }
    #error-screen p  { font-size: 14px; color: #7a7670; line-height: 1.6; }

    /* Hero */
    .hero { background: #1a1208; padding: 2rem 1.5rem 1.75rem; position: relative; overflow: hidden; }
    .hero::after { content: ''; position: absolute; top: -50px; right: -50px; width: 180px; height: 180px; border-radius: 50%; background: rgba(201,152,58,0.12); }
    .hero-badge   { display: inline-block; font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: #c9983a; font-weight: 500; margin-bottom: .4rem; }
    .hero h1      { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; color: #f5edd8; line-height: 1.15; margin-bottom: .35rem; }
    .hero-tagline { font-size: 13px; color: #9a8870; margin-bottom: 1.25rem; }
    .hero-meta    { display: flex; gap: 1.25rem; font-size: 12px; color: #7a6e5e; align-items: center; flex-wrap: wrap; }
    .badge-open   { display: flex; align-items: center; gap: 5px; color: #5cba84; }
    .dot-green    { width: 7px; height: 7px; border-radius: 50%; background: #3db87a; display: inline-block; }

    /* Category bar */
    .cat-bar { background: #fff; padding: .75rem 1.25rem; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #ece9e0; position: sticky; top: 0; z-index: 10; }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd9ce; background: transparent; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #6b6860; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .cat-btn.active { background: #1a1208; color: #f5edd8; border-color: #1a1208; }

    /* Menu */
    .section-label { padding: 1.25rem 1.5rem .5rem; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #9a9690; font-weight: 500; }
    .items-list    { padding: 0 1.25rem; display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
    .menu-section.hidden { display: none; }

    /* Item card */
    .item-card { background: #fff; border-radius: 14px; border: 1px solid #ece9e0; padding: 12px; display: flex; align-items: center; gap: 12px; transition: border-color .15s; }
    .item-card:hover { border-color: #c9b898; }
    .item-icon  { width: 58px; height: 58px; border-radius: 12px; background: #f5f3ee; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
    .item-info  { flex: 1; min-width: 0; }
    .item-name  { font-size: 14px; font-weight: 500; color: #1a1208; margin-bottom: 3px; }
    .item-desc  { font-size: 12px; color: #7a7670; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .item-tags  { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .tag        { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
    .tag-veg     { background: #e8f5e2; color: #2d6e1a; }
    .tag-nonveg  { background: #fdecea; color: #922020; }
    .tag-spicy   { background: #fdeee6; color: #8a3010; }
    .tag-popular { background: #fef3dd; color: #7a4e0a; }
    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .item-price { font-size: 15px; font-weight: 500; color: #1a1208; }
    .add-btn    { width: 30px; height: 30px; border-radius: 50%; background: #1a1208; color: #f5edd8; border: none; font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: transform .1s, background .15s; }
    .add-btn:hover  { background: #3a2e18; }
    .add-btn:active { transform: scale(.88); }

    /* Cart */
    .cart-bar { position: fixed; bottom: 1.25rem; left: 1.25rem; right: 1.25rem; background: #1a1208; color: #f5edd8; padding: 14px 20px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; cursor: pointer; transition: opacity .2s, transform .2s; box-shadow: 0 4px 24px rgba(0,0,0,.18); }
    .cart-bar.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
    .cart-badge { background: #c9983a; color: #1a1208; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; margin-right: 8px; }

    /* Footer */
    .footer { text-align: center; padding: 2rem 1.5rem 5rem; font-size: 12px; color: #b0ac9e; }
    .footer a { color: #c9983a; text-decoration: none; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading menu...</div>
  </div>

  <div id="error-screen">
    <h2>Menu not found</h2>
    <p>This QR code may be invalid or the restaurant may have moved.<br>Please ask staff for assistance.</p>
  </div>

  <div id="main-content" style="display:none">

    <div class="hero">
      <div class="hero-badge" id="hero-badge"></div>
      <h1 id="hero-name"></h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-meta">
        <span class="badge-open"><span class="dot-green"></span> Open now</span>
        <span id="hero-hours"></span>
        <span id="table-label"></span>
      </div>
    </div>

    <div class="cat-bar" id="cat-bar">
      <button class="cat-btn active" onclick="filterCategory('all', this)">All</button>
    </div>

    <main id="menu-body"></main>

    <div class="footer">Powered by <a href="#">QRMenu</a></div>
  </div>

  <div class="cart-bar hidden" id="cart-bar">
    <div>
      <span class="cart-badge" id="cart-count">0</span>
      <span id="cart-text">items in cart</span>
    </div>
    <div class="cart-total" id="cart-total">₹0 · View order</div>
  </div>

  <script>
    // ════════════════════════════════════════════════════
    //  PASTE YOUR SUPABASE CREDENTIALS BELOW
    //  Find them at: Supabase → Settings → API
    // ════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://njfxurvrdyumdqqgummz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qZnh1cnZyZHl1bWRxcWd1bW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTE5OTQsImV4cCI6MjA5MTIyNzk5NH0.uRM7gIRlYjTu9lmLLcjVWeJ2xx1lgZT70NRekPnqOGU';
    // ════════════════════════════════════════════════════

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const CATEGORY_ORDER  = ['starters', 'mains', 'breads', 'drinks', 'desserts'];
    const CATEGORY_LABELS = { starters: 'Starters', mains: 'Mains', breads: 'Breads & Rice', drinks: 'Drinks', desserts: 'Desserts' };

    let cartCount = 0, cartTotal = 0;

    function addToCart(name, price) {
      cartCount++; cartTotal += price;
      document.getElementById('cart-count').textContent = cartCount;
      document.getElementById('cart-text').textContent  = cartCount === 1 ? 'item in cart' : 'items in cart';
      document.getElementById('cart-total').textContent = '₹' + cartTotal + ' · View order';
      document.getElementById('cart-bar').classList.remove('hidden');
    }

    function filterCategory(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.menu-section').forEach(sec => {
        sec.classList.toggle('hidden', cat !== 'all' && sec.dataset.category !== cat);
      });
    }

    function buildItemCard(item) {
      const tags = [];
      if (item.is_veg)     tags.push('<span class="tag tag-veg">Veg</span>');
      if (!item.is_veg)    tags.push('<span class="tag tag-nonveg">Non-veg</span>');
      if (item.is_spicy)   tags.push('<span class="tag tag-spicy">Spicy</span>');
      if (item.is_popular) tags.push('<span class="tag tag-popular">Popular</span>');
      return `
        <div class="item-card">
          <div class="item-icon">${item.emoji || '🍽️'}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-desc">${item.description || ''}</div>
            <div class="item-tags">${tags.join('')}</div>
          </div>
          <div class="item-right">
            <div class="item-price">₹${item.price}</div>
            <button class="add-btn" onclick="addToCart('${item.name.replace(/'/g,"\\'")}', ${item.price})">+</button>
          </div>
        </div>`;
    }

    function buildMenu(restaurant, items) {
      document.getElementById('hero-badge').textContent   = (restaurant.established || '') + (restaurant.city ? ' · ' + restaurant.city : '');
      document.getElementById('hero-name').textContent    = restaurant.name;
      document.getElementById('hero-tagline').textContent = restaurant.tagline || '';
      document.getElementById('hero-hours').textContent   = restaurant.open_hours || '';

      const grouped = {};
      items.forEach(item => { (grouped[item.category] = grouped[item.category] || []).push(item); });

      const presentCats = CATEGORY_ORDER.filter(c => grouped[c]?.length);

      const catBar = document.getElementById('cat-bar');
      presentCats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className   = 'cat-btn';
        btn.textContent = CATEGORY_LABELS[cat] || cat;
        btn.onclick     = function() { filterCategory(cat, this); };
        catBar.appendChild(btn);
      });

      const menuBody = document.getElementById('menu-body');
      presentCats.forEach(cat => {
        const sec = document.createElement('section');
        sec.className        = 'menu-section';
        sec.dataset.category = cat;
        sec.innerHTML = `<div class="section-label">${CATEGORY_LABELS[cat] || cat}</div><div class="items-list">${grouped[cat].map(buildItemCard).join('')}</div>`;
        menuBody.appendChild(sec);
      });
    }

    async function loadMenu() {
      const params       = new URLSearchParams(window.location.search);
      const restaurantId = params.get('restaurant');
      const tableNum     = params.get('table');
      if (tableNum) document.getElementById('table-label').textContent = 'Table ' + tableNum;
      if (!restaurantId) { showError(); return; }

      try {
        const { data: restaurant, error: rErr } = await db.from('restaurants').select('*').eq('id', restaurantId).single();
        if (rErr || !restaurant) { showError(); return; }

        const { data: items, error: iErr } = await db.from('menu_items').select('*').eq('restaurant_id', restaurantId).order('category');
        if (iErr) { showError(); return; }

        buildMenu(restaurant, items || []);
        document.title = restaurant.name + ' · Menu';

        const loader = document.getElementById('loading-screen');
        loader.classList.add('fade-out');
        setTimeout(() => loader.style.display = 'none', 400);
        document.getElementById('main-content').style.display = 'block';
      } catch(e) {
        console.error(e);
        showError();
      }
    }

    function showError() {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('error-screen').style.display   = 'block';
    }

    loadMenu();
  </script>
</body>
</html>
