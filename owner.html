<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRMenu · Owner Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f5f3ee;color:#1a1a18;min-height:100vh}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .login-card{background:#fff;border-radius:16px;border:1px solid #ece9e0;padding:2.5rem;width:100%;max-width:380px}
    .login-brand{font-size:20px;font-weight:500;color:#1a1208;margin-bottom:.25rem}
    .login-brand span{color:#c9983a}
    .login-sub{font-size:13px;color:#9a9690;margin-bottom:1.5rem}
    .login-badge{display:inline-block;font-size:11px;background:#E1F5EE;color:#085041;padding:3px 10px;border-radius:10px;margin-bottom:1.5rem;font-weight:500}
    .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .fg label{font-size:12px;color:#7a7670;font-weight:500}
    .fg input{padding:10px 12px;border-radius:8px;border:1px solid #ddd9ce;font-size:13px;font-family:'DM Sans',sans-serif;color:#1a1208;outline:none;transition:border-color .15s;width:100%}
    .fg input:focus{border-color:#c9983a}
    .btn-login{width:100%;padding:11px;border-radius:8px;border:none;background:#1a1208;color:#f5edd8;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:.5rem}
    .btn-login:hover{background:#3a2e18}
    .login-err{font-size:12px;color:#922020;background:#fdecea;border-radius:6px;padding:8px 12px;margin-top:.75rem;display:none}
    #app{display:none}
    .topnav{background:#1a1208;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between}
    .topnav-brand{font-size:15px;font-weight:500;color:#f5edd8}
    .topnav-brand span{color:#c9983a}
    .nav-r{display:flex;align-items:center;gap:12px}
    .restro-name{font-size:13px;color:#c9983a;font-weight:500}
    .nav-email{font-size:12px;color:#7a6e5e}
    .btn-out{font-size:12px;color:#9a8870;background:transparent;border:1px solid #3a3020;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .btn-out:hover{background:#2a1e10;color:#f5edd8}
    .main{padding:1.5rem;max-width:720px;margin:0 auto}
    .page-title{font-size:20px;font-weight:500;color:#1a1208;margin-bottom:4px}
    .page-sub{font-size:13px;color:#7a7670;margin-bottom:1.75rem}
    .card{background:#fff;border-radius:14px;border:1px solid #ece9e0;padding:1.5rem;margin-bottom:1.25rem}
    .ctitle{font-size:14px;font-weight:500;color:#1a1208;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #f0ede6}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s}
    .bp{background:#1a1208;color:#f5edd8}.bp:hover{background:#3a2e18}
    .bd{background:#fdecea;color:#922020;border:1px solid #f5c4c4}.bd:hover{background:#f9d4d4}
    .bsm{padding:5px 12px;font-size:12px}
    .brow{display:flex;gap:8px;margin-top:1.25rem}
    .fsel{padding:9px 12px;border-radius:8px;border:1px solid #ddd9ce;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;color:#1a1208}
    .fta{padding:9px 12px;border-radius:8px;border:1px solid #ddd9ce;font-family:'DM Sans',sans-serif;font-size:13px;min-height:68px;resize:vertical;outline:none;width:100%}
    .cbr{display:flex;gap:1.5rem;margin-top:8px}
    .cbr label{display:flex;align-items:center;gap:6px;font-size:13px;color:#5a5850;cursor:pointer}
    .cbr input[type=checkbox]{width:15px;height:15px;accent-color:#c9983a;cursor:pointer}
    .mir{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #f0ede6}
    .mir:last-child{border-bottom:none}
    .mie{font-size:22px;width:36px;text-align:center;flex-shrink:0}
    .mii{flex:1;min-width:0}
    .min{font-size:14px;font-weight:500;color:#1a1208}
    .mim{font-size:12px;color:#9a9690;margin-top:2px;line-height:1.4}
    .mip{font-size:14px;font-weight:500;color:#1a1208;flex-shrink:0}
    .tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px}
    .tv{background:#e8f5e2;color:#2d6e1a}.tnv{background:#fdecea;color:#922020}
    .tsp{background:#fdeee6;color:#8a3010}.tpo{background:#fef3dd;color:#7a4e0a}
    .cat-head{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#b0ac9e;padding:12px 0 4px;font-weight:500}
    .empty{text-align:center;padding:2.5rem 1rem;color:#9a9690;font-size:13px}
    .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
    .sc{background:#fff;border-radius:12px;border:1px solid #ece9e0;padding:1rem 1.25rem}
    .slb{font-size:11px;color:#9a9690;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .sv{font-size:24px;font-weight:500;color:#1a1208}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1208;color:#f5edd8;padding:12px 20px;border-radius:10px;font-size:13px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:#1a4a2a}.toast.error{background:#4a1a1a}
    @media(max-width:480px){.fgrid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">QR<span>Menu</span></div>
    <div class="login-sub">Restaurant owner panel</div>
    <div class="login-badge">Restaurant Owner</div>
    <div class="fg"><label>Email</label><input type="email" id="lemail" placeholder="your@email.com"/></div>
    <div class="fg"><label>Password</label><input type="password" id="lpass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn-login" onclick="login()">Sign in</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="topnav">
    <div class="topnav-brand">QR<span>Menu</span></div>
    <div class="nav-r">
      <div class="restro-name" id="restro-name"></div>
      <div class="nav-email" id="uemail"></div>
      <button class="btn-out" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="page-title" id="page-title">My Menu</div>
    <div class="page-sub" id="page-sub">Manage your restaurant's menu items</div>

    <div class="stats-row">
      <div class="sc"><div class="slb">Total items</div><div class="sv" id="st-items">—</div></div>
      <div class="sc"><div class="slb">Categories</div><div class="sv" id="st-cats">—</div></div>
    </div>

    <!-- Add item form -->
    <div class="card">
      <div class="ctitle">Add a new dish</div>
      <div class="fgrid">
        <div class="fg"><label>Dish name *</label><input id="i-name" placeholder="e.g. Butter Chicken"/></div>
        <div class="fg"><label>Price (₹) *</label><input type="number" id="i-price" placeholder="380"/></div>
        <div class="fg"><label>Category *</label>
          <select id="i-cat" class="fsel">
            <option value="starters">Starters</option>
            <option value="mains">Mains</option>
            <option value="breads">Breads & Rice</option>
            <option value="drinks">Drinks</option>
            <option value="desserts">Desserts</option>
          </select>
        </div>
        <div class="fg"><label>Emoji</label><input id="i-emoji" placeholder="🍛" maxlength="4"/></div>
        <div class="fg" style="grid-column:1/-1"><label>Description</label><textarea id="i-desc" class="fta" placeholder="Describe the dish briefly..."></textarea></div>
      </div>
      <div class="cbr">
        <label><input type="checkbox" id="i-veg" checked/> Vegetarian</label>
        <label><input type="checkbox" id="i-spicy"/> Spicy</label>
        <label><input type="checkbox" id="i-pop"/> Popular</label>
      </div>
      <div class="brow"><button class="btn bp" onclick="addItem()">Add dish</button></div>
    </div>

    <!-- Current menu -->
    <div class="card">
      <div class="ctitle">Current menu</div>
      <div id="i-list"><div class="empty">Loading your menu...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ══════════════════════════════════
  //  PASTE YOUR SUPABASE CREDENTIALS
  // ══════════════════════════════════
  const SUPABASE_URL = 'PASTE_YOUR_PROJECT_URL_HERE';
  const SUPABASE_KEY = 'PASTE_YOUR_ANON_PUBLIC_KEY_HERE';
  // ══════════════════════════════════

  const {createClient} = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);
  const CAT = {starters:'Starters',mains:'Mains',breads:'Breads & Rice',drinks:'Drinks',desserts:'Desserts'};

  let myRestaurantId   = null;
  let myRestaurantName = '';

  function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast', 3500);
  }

  async function login() {
    const email = document.getElementById('lemail').value.trim();
    const pass  = document.getElementById('lpass').value;
    const err   = document.getElementById('lerr');
    err.style.display = 'none';

    const {data, error} = await db.auth.signInWithPassword({email, password: pass});
    if (error) { err.textContent=error.message; err.style.display='block'; return; }

    // Check role
    const {data: profile} = await db.from('profiles').select('role, restaurant_id').eq('id', data.user.id).single();
    if (!profile || profile.role !== 'owner') {
      await db.auth.signOut();
      err.textContent = 'Access denied. Owner accounts only.';
      err.style.display = 'block'; return;
    }
    if (!profile.restaurant_id) {
      await db.auth.signOut();
      err.textContent = 'Your account is not linked to a restaurant yet. Contact your admin.';
      err.style.display = 'block'; return;
    }

    myRestaurantId = profile.restaurant_id;
    showApp(data.user);
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('lpass').value = '';
    myRestaurantId = null;
  }

  async function showApp(user) {
    // Fetch restaurant name
    const {data: restro} = await db.from('restaurants').select('name, tagline').eq('id', myRestaurantId).single();
    myRestaurantName = restro?.name || 'My Restaurant';

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('uemail').textContent = user.email;
    document.getElementById('restro-name').textContent = myRestaurantName;
    document.getElementById('page-title').textContent = myRestaurantName + ' · Menu';
    document.getElementById('page-sub').textContent = restro?.tagline || 'Manage your menu items';

    loadItems();
  }

  // Auto-login if session exists
  db.auth.getSession().then(async ({data:{session}}) => {
    if (!session) return;
    const {data:p} = await db.from('profiles').select('role, restaurant_id').eq('id', session.user.id).single();
    if (p?.role === 'owner' && p?.restaurant_id) {
      myRestaurantId = p.restaurant_id;
      showApp(session.user);
    }
  });

  async function loadItems() {
    const el = document.getElementById('i-list');
    const {data, error} = await db.from('menu_items').select('*')
      .eq('restaurant_id', myRestaurantId)
      .order('category');

    if (error) { el.innerHTML='<div class="empty">Error loading items. Please refresh.</div>'; return; }

    document.getElementById('st-items').textContent = data?.length || 0;
    const cats = [...new Set((data||[]).map(i=>i.category))];
    document.getElementById('st-cats').textContent = cats.length;

    if (!data?.length) { el.innerHTML='<div class="empty">No dishes yet. Add your first one above!</div>'; return; }

    let html='', lastCat='';
    data.forEach(item => {
      if (item.category !== lastCat) {
        if (lastCat) html+='</div>';
        html+=`<div class="cat-head">${CAT[item.category]||item.category}</div><div>`;
        lastCat=item.category;
      }
      const tags=[];
      if (item.is_veg)     tags.push('<span class="tag tv">Veg</span>');
      if (!item.is_veg)    tags.push('<span class="tag tnv">Non-veg</span>');
      if (item.is_spicy)   tags.push('<span class="tag tsp">Spicy</span>');
      if (item.is_popular) tags.push('<span class="tag tpo">Popular</span>');
      html+=`
        <div class="mir">
          <div class="mie">${item.emoji||'🍽️'}</div>
          <div class="mii">
            <div class="min">${item.name} &nbsp;${tags.join(' ')}</div>
            <div class="mim">${item.description||''}</div>
          </div>
          <div class="mip">₹${item.price}</div>
          <button class="btn bd bsm" onclick="delItem('${item.id}','${item.name.replace(/'/g,"\\'")}')">✕</button>
        </div>`;
    });
    if (lastCat) html+='</div>';
    el.innerHTML=html;
  }

  async function addItem() {
    const name  = document.getElementById('i-name').value.trim();
    const price = parseInt(document.getElementById('i-price').value);
    if (!name)  { toast('Please enter a dish name','error'); return; }
    if (!price) { toast('Please enter a valid price','error'); return; }

    const {error} = await db.from('menu_items').insert({
      restaurant_id: myRestaurantId,
      name, price,
      category:    document.getElementById('i-cat').value,
      description: document.getElementById('i-desc').value.trim(),
      emoji:       document.getElementById('i-emoji').value.trim() || '🍽️',
      is_veg:      document.getElementById('i-veg').checked,
      is_spicy:    document.getElementById('i-spicy').checked,
      is_popular:  document.getElementById('i-pop').checked,
    });

    if (error) { toast(error.message,'error'); return; }
    toast(name+' added to your menu!','success');
    ['i-name','i-price','i-desc','i-emoji'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('i-veg').checked=true;
    document.getElementById('i-spicy').checked=false;
    document.getElementById('i-pop').checked=false;
    loadItems();
  }

  async function delItem(id, name) {
    if (!confirm('Remove "'+name+'" from your menu?')) return;
    const {error} = await db.from('menu_items').delete().eq('id',id);
    if (error) { toast('Error: '+error.message,'error'); return; }
    toast(name+' removed','success');
    loadItems();
  }
</script>
</body>
</html>
